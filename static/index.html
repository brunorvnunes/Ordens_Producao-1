<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Ordens de Produção</title>
    <style>
        /* Variáveis de Cores - Dark Theme Suave */
        :root {
            --bg-body: #121417;
            --bg-card: #1c1f26;
            --bg-input: #2a2e38;
            --text-main: #e0e6ed;
            --text-dim: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
            --border: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        main {
            width: 100%;
            max-width: 1100px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0 20px 0;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        #status-badge {
            font-size: 0.8rem;
            padding: 4px 12px;
            border-radius: 20px;
            background: var(--bg-input);
            color: var(--text-dim);
            border: 1px solid var(--border);
        }

        /* Cards e Seções */
        .card {
            background-color: var(--bg-card);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
        }

        h2 {
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Formulário */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.9rem;
            font-weight: 500;
        }

        input, select {
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            color: white;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
        }

        button {
            cursor: pointer;
            border: none;
            border-radius: 6px;
            padding: 12px 24px;
            font-weight: 600;
            transition: all 0.2s;
        }

        #btn-cadastrar {
            background-color: var(--accent);
            color: white;
            width: 100%;
        }

        #btn-cadastrar:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn-atualizar {
            background-color: transparent;
            color: var(--text-dim);
            border: 1px solid var(--border);
            padding: 8px 16px;
            font-size: 0.85rem;
        }

        .btn-atualizar:hover {
            background-color: var(--border);
            color: white;
        }

        /* Tabela */
        .listagem-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .tabela-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: rgba(255,255,255,0.03);
            padding: 12px;
            font-size: 0.85rem;
            color: var(--text-dim);
            border-bottom: 2px solid var(--border);
        }

        td {
            padding: 14px 12px;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
        }

        tr:hover {
            background-color: rgba(255,255,255,0.02);
        }

        /* Status Pills na Tabela */
        .status-pill {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .oculto { display: none; }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <main>
        <header>
            <div class="header-content">
                <h1>Sistema O.P.</h1>
            </div>
            <span id="status-badge">● Sistema Online</span>
        </header>

        <section class="card" id="secao-cadastro">
            <h2>Nova Ordem de Produção</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label for="produto">Nome do Produto</label>
                    <input type="text" id="produto" placeholder="Ex: Motor Elétrico WEG W22">
                </div>

                <div class="form-group">
                    <label for="quantidade">Quantidade</label>
                    <input type="number" id="quantidade" placeholder="00" min="1">
                </div>

                <div class="form-group">
                    <label for="status-novo">Prioridade/Status</label>
                    <select id="status-novo">
                        <option value="Pendente">🟡 Pendente</option>
                        <option value="Em andamento">🔵 Em andamento</option>
                        <option value="Concluida">🟢 Concluída</option>
                    </select>
                </div>
            </div>

            <button id="btn-cadastrar" onclick="criarOrdem()">
                Cadastrar Ordem de Produção
            </button>
        </section>

        <section class="card" id="secao-listagem">
            <div class="listagem-header">
                <h2>Ordens em Aberto</h2>
                <button onclick="carregarOrdens()" class="btn-atualizar">
                    🔄 Atualizar Lista
                </button>
            </div>

            <div class="tabela-container">
                <table id="tabela-ordens">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>PRODUTO</th>
                            <th>QTD</th>
                            <th>STATUS</th>
                            <th>DATA</th>
                            <th>AÇÕES</th>
                        </tr>
                    </thead>
                    <tbody id="corpo-tabela">
                        <tr>
                            <td>#1024</td>
                            <td>Eixo Turbina Mod-B</td>
                            <td>50</td>
                            <td><span class="status-pill" style="background: rgba(59,130,246,0.2); color: #3b82f6;">Andamento</span></td>
                            <td>08/04/2024</td>
                            <td><button style="background:none; color:var(--text-dim); padding:0">Editar</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <p id="sem-dados" class="oculto" style="text-align: center; padding: 20px; color: var(--text-dim);">
                Nenhuma ordem encontrada no banco de dados.
            </p>
        </section>
    </main>

    <script>
        // Mantendo suas funções originais apenas para não quebrar a lógica
        function criarOrdem() {
            alert("Botão clicado! Aqui entraria sua lógica de JS.");
        }
        function carregarOrdens() {
            console.log("Atualizando...");
        }
    </script>
</body>
</html>
